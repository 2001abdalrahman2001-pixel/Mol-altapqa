<script>
  (async function(){
    let sections = [], shops = [], offers = [], products = {}, events = [];
    let shopTempImages = []; // لتخزين صور المحل مؤقتاً (Base64)
    const MAX_SHOP_IMAGES = 2;

    async function loadData() {
      try {
        // جلب الأقسام
        const sectionsSnapshot = await getDocs(collection(db, 'sections'));
        sections = sectionsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        // جلب المحلات
        const shopsSnapshot = await getDocs(collection(db, 'shops'));
        shops = shopsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        // جلب العروض
        const offersSnapshot = await getDocs(collection(db, 'offers'));
        offers = offersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        // جلب المنتجات
        const productsSnapshot = await getDocs(collection(db, 'products'));
        products = {};
        productsSnapshot.docs.forEach(doc => {
          const data = doc.data();
          if (!products[data.shopId]) products[data.shopId] = [];
          products[data.shopId].push({ id: doc.id, ...data });
        });

        // جلب الأحداث
        const eventsSnapshot = await getDocs(collection(db, 'events'));
        events = eventsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        updateStats();
        renderAll();
      } catch (error) {
        console.error('خطأ في تحميل البيانات:', error);
        showToast('خطأ في تحميل البيانات', 'error');
      }
    }

    async function saveAll() {
      try {
        // حفظ الأقسام
        for (const section of sections) {
          await setDoc(doc(db, 'sections', section.id), { name: section.name, icon: section.icon });
        }

        // حفظ المحلات
        for (const shop of shops) {
          await setDoc(doc(db, 'shops', shop.id), {
            name: shop.name, floor: shop.floor, phone: shop.phone, sectionId: shop.sectionId, category: shop.category, images: shop.images || [], hasOffer: shop.hasOffer || false
          });
        }

        // حفظ العروض
        for (const offer of offers) {
          await setDoc(doc(db, 'offers', offer.id || `offer_${Date.now()}`), {
            title: offer.title, description: offer.description, badge: offer.badge, shopName: offer.shopName, type: offer.type, icon: offer.icon, badgeIcon: offer.badgeIcon
          });
        }

        // حفظ المنتجات
        for (const shopId in products) {
          for (const product of products[shopId]) {
            await setDoc(doc(db, 'products', product.id || `product_${Date.now()}_${Math.random()}`), {
              shopId: shopId, name: product.name, price: product.price, icon: product.icon, description: product.description,
              images: product.images || [], colors: product.colors || [], sizes: product.sizes || [], active: product.active, hasOffer: product.hasOffer
            });
          }
        }

        // حفظ الأحداث
        for (const event of events) {
          await setDoc(doc(db, 'events', event.id || `event_${Date.now()}`), {
            title: event.title, description: event.description, date: event.date, type: event.type
          });
        }
      } catch (error) {
        console.error('خطأ في حفظ البيانات:', error);
        showToast('فشل حفظ البيانات في Firebase', 'error');
        throw error;
      }
    }

    function countTotalProducts() { return Object.values(products).reduce((sum, arr) => sum + arr.length, 0); }
    function updateStats() {
      document.getElementById('totalShops').innerText = shops.length;
      document.getElementById('totalSections').innerText = sections.length;
      document.getElementById('totalProducts').innerText = countTotalProducts();
      document.getElementById('totalOffers').innerText = offers.length;
      document.getElementById('totalEvents').innerText = events.length;
    }

    function renderAll() { 
      renderSections(); 
      renderShops(); 
      renderOffersEvents(); 
      renderAllProducts(); 
      populateSelects(); 
      updateStats(); 
    }

    // ========== الأقسام (بدون تغيير) ==========
    function renderSections() {
      const c = document.getElementById('sectionsList'); c.innerHTML = '';
      if (sections.length === 0) {
        c.innerHTML = '<div class="list-item" style="justify-content:center;">لا توجد أقسام. أضف قسماً جديداً.</div>';
        return;
      }
      sections.forEach((s, i) => {
        const d = document.createElement('div'); d.className = 'list-item';
        d.innerHTML = `<div class="item-info"><div class="item-icon"><i class="fas ${s.icon}"></i></div><div class="item-details"><h4>${s.name}</h4><p>${s.id}</p></div></div>
          <div class="item-actions"><button class="action-btn edit-section" data-idx="${i}"><i class="fas fa-edit"></i></button>
          <button class="action-btn danger-btn delete-section" data-idx="${i}"><i class="fas fa-trash"></i></button></div>`;
        c.appendChild(d);
      });
      document.querySelectorAll('.edit-section').forEach(b => b.onclick = () => openSectionModal(b.dataset.idx));
      document.querySelectorAll('.delete-section').forEach(b => b.onclick = async () => {
        if(confirm('حذف القسم وجميع محلاته ومنتجاتها وعروضها؟')) {
          const secId = sections[b.dataset.idx].id;
          const shopsToDelete = shops.filter(s => s.sectionId === secId);
          const shopNames = shopsToDelete.map(s => s.name);
          
          shops = shops.filter(s => s.sectionId !== secId);
          shopsToDelete.forEach(s => { delete products[s.id]; });
          offers = offers.filter(o => !shopNames.includes(o.shopName));
          
          sections.splice(b.dataset.idx,1);
          try {
            await saveAll();
            renderAll();
            showToast('تم الحذف');
          } catch (error) {
            console.error(error);
          }
        }
      });
    }

    // معاينة الأيقونة (بدون تغيير)
    const iconSelect = document.getElementById('newSectionIconSelect');
    const customWrapper = document.getElementById('customIconWrapper');
    const customInput = document.getElementById('newSectionIconCustom');
    const iconPreview = document.getElementById('iconPreview');

    iconSelect.addEventListener('change', function() {
        const val = this.value;
        if (val === 'custom') {
            customWrapper.style.display = 'block';
            updatePreview(customInput.value || 'fa-star');
        } else {
            customWrapper.style.display = 'none';
            updatePreview(val);
        }
    });
    customInput.addEventListener('input', function() {
        if (iconSelect.value === 'custom') updatePreview(this.value || 'fa-star');
    });
    function updatePreview(iconClass) {
        iconPreview.innerHTML = `<i class="fas ${iconClass}"></i>`;
    }

    const modalIconSelect = document.getElementById('modalSectionIconSelect');
    const modalCustomWrapper = document.getElementById('modalCustomIconWrapper');
    const modalCustomInput = document.getElementById('modalSectionIconCustom');
    const modalIconPreview = document.getElementById('modalIconPreview');
    const modalIconFinal = document.getElementById('modalSectionIconFinal');

    modalIconSelect.addEventListener('change', function() {
        const val = this.value;
        if (val === 'custom') {
            modalCustomWrapper.style.display = 'block';
            updateModalPreview(modalCustomInput.value || 'fa-star');
            modalIconFinal.value = modalCustomInput.value || 'fa-star';
        } else {
            modalCustomWrapper.style.display = 'none';
            updateModalPreview(val);
            modalIconFinal.value = val;
        }
    });
    modalCustomInput.addEventListener('input', function() {
        updateModalPreview(this.value || 'fa-star');
        modalIconFinal.value = this.value;
    });
    function updateModalPreview(iconClass) {
        modalIconPreview.innerHTML = `<i class="fas ${iconClass}"></i>`;
    }

    function openSectionModal(idx) {
        const sec = sections[idx];
        document.getElementById('modalSectionName').value = sec.name;
        const commonIcons = ['fa-tshirt', 'fa-mask', 'fa-mobile-alt', 'fa-utensils', 'fa-cut', 'fa-tablets', 'fa-store', 'fa-shoe-prints', 'fa-clock', 'fa-gem'];
        if (commonIcons.includes(sec.icon)) {
            modalIconSelect.value = sec.icon;
            modalCustomWrapper.style.display = 'none';
            modalIconFinal.value = sec.icon;
            updateModalPreview(sec.icon);
        } else {
            modalIconSelect.value = 'custom';
            modalCustomWrapper.style.display = 'block';
            modalCustomInput.value = sec.icon;
            modalIconFinal.value = sec.icon;
            updateModalPreview(sec.icon);
        }
        document.getElementById('modalSectionIndex').value = idx;
        document.getElementById('sectionModal').style.display = 'flex';
    }

    // ========== المحلات (مع تعديلات رفع الصور) ==========
    function renderShops() {
      const filter = document.getElementById('shopSectionFilter').value;
      const c = document.getElementById('shopsList'); c.innerHTML = '';
      const filtered = filter ? shops.filter(s => s.sectionId === filter) : shops;
      if (filtered.length === 0) {
        c.innerHTML = '<div class="list-item" style="justify-content:center;">لا توجد محلات في هذا القسم.</div>';
        return;
      }
      filtered.forEach(s => {
        const sec = sections.find(x => x.id === s.sectionId)?.name || 'بدون قسم';
        const d = document.createElement('div'); d.className = 'list-item';
        const imgSrc = (s.images && s.images.length > 0) ? s.images[0] : 'https://placehold.co/100';
        d.innerHTML = `<div class="item-info"><img class="shop-thumb" src="${imgSrc}"><div class="item-details"><h4>${s.name}</h4><p>${sec} · ${s.floor}</p></div></div>
          <div class="item-actions"><button class="action-btn edit-shop" data-id="${s.id}"><i class="fas fa-edit"></i></button>
          <button class="action-btn danger-btn delete-shop" data-id="${s.id}"><i class="fas fa-trash"></i></button></div>`;
        c.appendChild(d);
      });
      document.querySelectorAll('.edit-shop').forEach(b => b.onclick = () => openShopModal(shops.findIndex(s => s.id === b.dataset.id)));
      document.querySelectorAll('.delete-shop').forEach(b => b.onclick = async () => {
        if(confirm('حذف المحل ومنتجاته وعروضه؟')) {
          const shop = shops.find(s => s.id === b.dataset.id);
          const id = b.dataset.id;
          delete products[id];
          offers = offers.filter(o => o.shopName !== shop.name);
          shops = shops.filter(s => s.id !== id);
          try {
            await saveAll();
            renderAll();
            showToast('تم الحذف');
          } catch (error) {
            console.error(error);
          }
        }
      });
    }

    function openShopModal(idx = null) {
      populateSelects();
      shopTempImages = []; // إعادة تعيين الصور المؤقتة
      if(idx !== null) {
        const s = shops[idx];
        document.getElementById('shopModalTitle').innerText = 'تعديل المحل';
        document.getElementById('modalShopId').value = s.id; document.getElementById('modalShopId').disabled = true;
        document.getElementById('modalShopName').value = s.name;
        document.getElementById('modalShopFloor').value = s.floor;
        document.getElementById('modalShopPhone').value = s.phone || '';
        document.getElementById('modalShopSection').value = s.sectionId;
        document.getElementById('modalShopCategory').value = s.category || 'all';
        document.getElementById('modalShopHasOffer').checked = s.hasOffer || false;
        shopTempImages = s.images || [];
        document.getElementById('saveShopBtn').dataset.editIdx = idx;
        renderShopImagePreview();
      } else {
        document.getElementById('shopModalTitle').innerText = 'إضافة محل';
        document.getElementById('modalShopId').disabled = false; document.getElementById('modalShopId').value = '';
        document.getElementById('modalShopName').value = ''; document.getElementById('modalShopFloor').value = '';
        document.getElementById('modalShopPhone').value = ''; 
        document.getElementById('modalShopHasOffer').checked = false;
        delete document.getElementById('saveShopBtn').dataset.editIdx;
        renderShopImagePreview();
      }
      document.getElementById('shopModal').style.display = 'flex';
    }

    // دوال معاينة صور المحل
    function renderShopImagePreview() {
      const container = document.getElementById('shopImagesPreviewContainer');
      const limitMsg = document.getElementById('shopImageLimitMsg');
      if (!shopTempImages.length) {
        container.innerHTML = `<div style="width:100%; text-align:center; padding:16px; color:#888; background:#fefcf5; border-radius:28px; border:1px dashed #ccc;"><i class="fas fa-cloud-upload-alt" style="font-size:28px; opacity:0.5;"></i><p>لم يتم رفع صور بعد</p></div>`;
      } else {
        container.innerHTML = shopTempImages.map((img, i) => `
          <div class="preview-img-wrapper">
            <img src="${img}" class="image-preview">
            <span class="remove-img" data-index="${i}">&times;</span>
          </div>
        `).join('');
        document.querySelectorAll('.remove-img').forEach(btn => btn.onclick = (e) => {
          const idx = e.target.dataset.index;
          shopTempImages.splice(idx, 1);
          renderShopImagePreview();
        });
      }
      const remaining = MAX_SHOP_IMAGES - shopTempImages.length;
      limitMsg.innerHTML = remaining ? `يمكنك إضافة ${remaining} ${remaining === 2 ? 'صورتين' : 'صورة'} إضافية` : '✅ تم الوصول للحد الأقصى (صورتان)';
    }

    function handleShopImageFile(file) {
      if (shopTempImages.length >= MAX_SHOP_IMAGES) { showToast('يمكنك رفع صورتين فقط'); return; }
      const reader = new FileReader();
      reader.onload = e => { shopTempImages.push(e.target.result); renderShopImagePreview(); };
      reader.readAsDataURL(file);
    }

    // ربط أزرار رفع صور المحل
    document.getElementById('uploadShopImageBtn').addEventListener('click', () => document.getElementById('shopImageInput').click());
    document.getElementById('captureShopImageBtn').addEventListener('click', () => document.getElementById('shopCameraInput').click());
    document.getElementById('shopImageInput').addEventListener('change', e => { if(e.target.files[0]) { handleShopImageFile(e.target.files[0]); e.target.value = ''; } });
    document.getElementById('shopCameraInput').addEventListener('change', e => { if(e.target.files[0]) { handleShopImageFile(e.target.files[0]); e.target.value = ''; } });

    // حفظ المحل (تعديل لاستخدام shopTempImages)
    document.getElementById('saveShopBtn').onclick = async () => {
      const id = document.getElementById('modalShopId').value.trim();
      const name = document.getElementById('modalShopName').value.trim();
      const floor = document.getElementById('modalShopFloor').value.trim();
      if(!id||!name||!floor) return showToast('الحقول الأساسية مطلوبة');
      const editIdx = document.getElementById('saveShopBtn').dataset.editIdx;
      const data = {
        id, name, floor,
        phone: document.getElementById('modalShopPhone').value,
        sectionId: document.getElementById('modalShopSection').value,
        category: document.getElementById('modalShopCategory').value,
        images: shopTempImages, // استخدام الصور المرفوعة Base64
        hasOffer: document.getElementById('modalShopHasOffer').checked
      };
      if(editIdx !== undefined) shops[editIdx] = data;
      else { if(shops.find(s=>s.id===id)) return showToast('المعرف موجود'); shops.push(data); }
      try {
        await saveAll();
        renderAll();
        closeModal('shopModal');
        showToast('تم الحفظ');
      } catch (error) {
        console.error(error);
      }
    };

    // ========== المنتجات (بدون تغيير) ==========
    function renderAllProducts() {
      const filter = document.getElementById('productFilterShop').value;
      const c = document.getElementById('allProductsList'); c.innerHTML = '';
      let hasProducts = false;
      for(const id in products) {
        if(filter && id !== filter) continue;
        const shop = shops.find(s=>s.id===id) || { name: id };
        products[id].forEach((p, i) => {
          hasProducts = true;
          const d = document.createElement('div'); d.className = 'list-item';
          d.innerHTML = `<div class="item-info"><div class="item-icon"><i class="fas ${p.icon}"></i></div><div class="item-details"><h4>${p.name}</h4><p>${p.price}$ · ${shop.name}</p></div></div>
            <div class="item-actions"><button class="action-btn edit-product" data-shop="${id}" data-idx="${i}"><i class="fas fa-edit"></i></button>
            <button class="action-btn danger-btn delete-product" data-shop="${id}" data-idx="${i}"><i class="fas fa-trash"></i></button></div>`;
          c.appendChild(d);
        });
      }
      if (!hasProducts) c.innerHTML = '<div class="list-item" style="justify-content:center;">لا توجد منتجات.</div>';
      document.querySelectorAll('.edit-product').forEach(b => b.onclick = () => openProductModal(b.dataset.shop, b.dataset.idx));
      document.querySelectorAll('.delete-product').forEach(b => b.onclick = async () => {
        if(confirm('حذف المنتج؟')) {
          products[b.dataset.shop].splice(b.dataset.idx,1);
          if(products[b.dataset.shop].length===0) delete products[b.dataset.shop];
          try {
            await saveAll();
            renderAll();
            showToast('تم الحذف');
          } catch (error) {
            console.error(error);
          }
        }
      });
    }

    function openProductModal(shopId, idx) {
      const p = products[shopId][idx];
      document.getElementById('modalProdName').value = p.name;
      document.getElementById('modalProdPrice').value = p.price;
      document.getElementById('modalProdIcon').value = p.icon || '';
      document.getElementById('modalProdDesc').value = p.longDesc || '';
      document.getElementById('modalProdImages').value = (p.images||[]).join('\n');
      document.getElementById('modalProdColors').value = (p.colors||[]).join(',');
      document.getElementById('modalProdSizes').value = (p.sizes||[]).join(',');
      document.getElementById('modalProdHasOffer').checked = p.hasOffer || false;
      document.getElementById('modalProdActive').checked = p.active !== false;
      document.getElementById('modalProdShopId').value = shopId;
      document.getElementById('modalProdIndex').value = idx;
      document.getElementById('productModal').style.display = 'flex';
    }

    // ========== العروض والفعاليات (بدون تغيير) ==========
    function renderOffersEvents() {
      const filter = document.getElementById('offersEventsFilter').value;
      const c = document.getElementById('offersEventsList');
      c.innerHTML = '';
      
      let items = [];
      
      if (filter === 'all' || filter === 'offers') {
        offers.forEach((o, i) => {
          items.push({
            type: 'offer',
            data: o,
            originalIndex: i,
            icon: o.icon || 'fa-gift',
            title: o.title,
            subtitle: o.shopName,
            desc: o.desc
          });
        });
      }
      
      if (filter === 'all' || filter === 'events') {
        events.forEach((e, i) => {
          items.push({
            type: 'event',
            data: e,
            originalIndex: i,
            icon: 'fa-calendar-alt',
            title: e.title,
            subtitle: e.date,
            desc: e.desc || ''
          });
        });
      }
      
      if (items.length === 0) {
        c.innerHTML = '<div class="list-item" style="justify-content:center;">لا توجد عناصر.</div>';
        return;
      }
      
      items.forEach(item => {
        const d = document.createElement('div'); d.className = 'list-item';
        const badge = item.type === 'offer' ? '🏷️ عرض' : '📅 فعالية';
        d.innerHTML = `
          <div class="item-info">
            <div class="item-icon"><i class="fas ${item.icon}"></i></div>
            <div class="item-details">
              <h4>${item.title} <span style="font-size:0.7rem; background:#e9ecef; padding:2px 8px; border-radius:20px;">${badge}</span></h4>
              <p>${item.subtitle}</p>
              ${item.desc ? `<p style="color:#6c757d;">${item.desc}</p>` : ''}
            </div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit-item" data-type="${item.type}" data-idx="${item.originalIndex}"><i class="fas fa-edit"></i></button>
            <button class="action-btn danger-btn delete-item" data-type="${item.type}" data-idx="${item.originalIndex}"><i class="fas fa-trash"></i></button>
          </div>
        `;
        c.appendChild(d);
      });
      
      document.querySelectorAll('.edit-item').forEach(b => {
        b.onclick = () => {
          const type = b.dataset.type;
          const idx = parseInt(b.dataset.idx);
          if (type === 'offer') openOfferModal(idx);
          else openEventModal(idx);
        };
      });
      
      document.querySelectorAll('.delete-item').forEach(b => {
        b.onclick = async () => {
          const type = b.dataset.type;
          const idx = parseInt(b.dataset.idx);
          if (type === 'offer') {
            if(confirm('حذف العرض؟')) {
              offers.splice(idx, 1);
              try {
                await saveAll();
                renderOffersEvents();
                updateStats();
                showToast('تم الحذف');
              } catch (error) {
                console.error(error);
              }
            }
          } else {
            if(confirm('حذف الفعالية؟')) {
              events.splice(idx, 1);
              try {
                await saveAll();
                renderOffersEvents();
                updateStats();
                showToast('تم الحذف');
              } catch (error) {
                console.error(error);
              }
            }
          }
        };
      });
    }

    function openOfferModal(idx = null) {
      populateSelects();
      if(idx !== null) {
        const o = offers[idx];
        document.getElementById('offerModalTitle').innerText = 'تعديل عرض';
        document.getElementById('modalOfferShop').value = o.shopName;
        document.getElementById('modalOfferTitle').value = o.title;
        document.getElementById('modalOfferDesc').value = o.desc;
        document.getElementById('modalOfferBadge').value = o.badge || '';
        document.getElementById('modalOfferBadgeIcon').value = o.badgeIcon || '';
        document.getElementById('modalOfferIndex').value = idx;
      } else {
        document.getElementById('offerModalTitle').innerText = 'إضافة عرض';
        document.getElementById('modalOfferShop').value = '';
        document.getElementById('modalOfferTitle').value = '';
        document.getElementById('modalOfferDesc').value = '';
        document.getElementById('modalOfferBadge').value = 'عرض المدير';
        document.getElementById('modalOfferBadgeIcon').value = 'fa-crown';
        document.getElementById('modalOfferIndex').value = '';
      }
      document.getElementById('offerModal').style.display = 'flex';
    }

    function openEventModal(idx = null) {
      if(idx !== null) {
        const e = events[idx];
        document.getElementById('eventModalTitle').innerText = 'تعديل فعالية';
        document.getElementById('modalEventTitle').value = e.title;
        document.getElementById('modalEventDate').value = e.date;
        document.getElementById('modalEventDesc').value = e.desc || '';
        document.getElementById('modalEventIndex').value = idx;
      } else {
        document.getElementById('eventModalTitle').innerText = 'إضافة فعالية';
        document.getElementById('modalEventTitle').value = '';
        document.getElementById('modalEventDate').value = '';
        document.getElementById('modalEventDesc').value = '';
        document.getElementById('modalEventIndex').value = '';
      }
      document.getElementById('eventModal').style.display = 'flex';
    }

    function populateSelects() {
      const secSel = document.getElementById('modalShopSection'); secSel.innerHTML = '<option value="">اختر القسم</option>';
      sections.forEach(s => secSel.add(new Option(s.name, s.id)));
      const offSel = document.getElementById('modalOfferShop'); offSel.innerHTML = '<option value="">اختر المحل</option>';
      shops.forEach(s => offSel.add(new Option(s.name, s.name)));
      const prodFilter = document.getElementById('productFilterShop'); prodFilter.innerHTML = '<option value="">كل المحلات</option>';
      shops.forEach(s => prodFilter.add(new Option(s.name, s.id)));
      const shopFilter = document.getElementById('shopSectionFilter'); shopFilter.innerHTML = '<option value="">جميع الأقسام</option>';
      sections.forEach(s => shopFilter.add(new Option(s.name, s.id)));
    }

    function showToast(m) {
      const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // ========== مستمعات الأحداث (مع تعديلات طفيفة) ==========
    document.getElementById('addSectionBtn').onclick = async () => {
        const n = document.getElementById('newSectionName').value.trim();
        let i = iconSelect.value;
        if (i === 'custom') i = customInput.value.trim() || 'fa-store';
        if (!n) return showToast('أدخل اسم القسم');
        const id = n.replace(/\s/g, '_').toLowerCase();
        if (sections.find(s => s.id === id)) return showToast('المعرف موجود');
        sections.push({ id, name: n, icon: i });
        try {
          await saveAll();
          renderAll();
          showToast('تمت الإضافة');
          document.getElementById('newSectionName').value = ''; 
          iconSelect.value = 'fa-tshirt';
          customWrapper.style.display = 'none';
          customInput.value = '';
          updatePreview('fa-tshirt');
        } catch (error) {
          console.error(error);
        }
    };

    document.getElementById('saveSectionBtn').onclick = async () => {
        const idx = document.getElementById('modalSectionIndex').value;
        if (idx === '') return showToast('خطأ في تحديد القسم');
        sections[idx].name = document.getElementById('modalSectionName').value;
        sections[idx].icon = modalIconFinal.value;
        try {
          await saveAll();
          renderAll();
          closeModal('sectionModal');
          showToast('تم التحديث');
        } catch (error) {
          console.error(error);
        }
    };

    document.getElementById('shopSectionFilter').addEventListener('change', renderShops);
    document.getElementById('showAddShopModalBtn').onclick = () => openShopModal();

    document.getElementById('addOfferBtn').onclick = () => openOfferModal();
    document.getElementById('saveOfferBtn').onclick = async () => {
      const shop = document.getElementById('modalOfferShop').value;
      const title = document.getElementById('modalOfferTitle').value;
      if(!shop||!title) return showToast('اختر محلاً وعنواناً');
      const offer = {
        shopName: shop, title,
        desc: document.getElementById('modalOfferDesc').value,
        icon: 'fa-gift',
        badge: document.getElementById('modalOfferBadge').value,
        badgeIcon: document.getElementById('modalOfferBadgeIcon').value
      };
      const idx = document.getElementById('modalOfferIndex').value;
      if(idx !== '') offers[idx] = offer; else offers.push(offer);
      try {
        await saveAll();
        renderOffersEvents();
        updateStats();
        closeModal('offerModal');
        showToast('تم الحفظ');
      } catch (error) {
        console.error(error);
      }
    };

    document.getElementById('addEventBtn').onclick = () => openEventModal();
    document.getElementById('saveEventBtn').onclick = async () => {
      const title = document.getElementById('modalEventTitle').value;
      const date = document.getElementById('modalEventDate').value;
      if(!title || !date) return showToast('العنوان والتاريخ مطلوبان');
      const event = {
        title, date,
        desc: document.getElementById('modalEventDesc').value
      };
      const idx = document.getElementById('modalEventIndex').value;
      if(idx !== '') events[idx] = event; else events.push(event);
      try {
        await saveAll();
        renderOffersEvents();
        updateStats();
        closeModal('eventModal');
        showToast('تم الحفظ');
      } catch (error) {
        console.error(error);
      }
    };

    document.getElementById('saveProductBtn').onclick = async () => {
      const shop = document.getElementById('modalProdShopId').value;
      const idx = document.getElementById('modalProdIndex').value;
      const prod = {
        name: document.getElementById('modalProdName').value,
        price: parseFloat(document.getElementById('modalProdPrice').value),
        icon: document.getElementById('modalProdIcon').value,
        longDesc: document.getElementById('modalProdDesc').value,
        images: document.getElementById('modalProdImages').value.split('\n').filter(l=>l.trim()),
        colors: document.getElementById('modalProdColors').value.split(',').map(c=>c.trim()).filter(c=>c),
        sizes: document.getElementById('modalProdSizes').value.split(',').map(s=>s.trim()).filter(s=>s),
        hasOffer: document.getElementById('modalProdHasOffer').checked,
        active: document.getElementById('modalProdActive').checked
      };
      if(!products[shop]) products[shop] = [];
      if(idx !== '') products[shop][idx] = prod; else products[shop].push(prod);
      try {
        await saveAll();
        renderAll();
        closeModal('productModal');
        showToast('تم الحفظ');
      } catch (error) {
        console.error(error);
      }
    };

    document.getElementById('productFilterShop').addEventListener('change', renderAllProducts);
    document.getElementById('offersEventsFilter').addEventListener('change', renderOffersEvents);

    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById(`tab-${b.dataset.tab}`).classList.add('active');
    }));

    window.addEventListener('click', (e) => { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; });
    await loadData();
  })();
</script>
</body>
</html>
